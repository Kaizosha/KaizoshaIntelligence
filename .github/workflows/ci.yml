name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  build-and-test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Swift is not currently available on GitHub-hosted Ubuntu 24.04 runners.
        os: [macos-15, ubuntu-22.04]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Swift Version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Example Smoke Build
        run: |
          swift build --product KaizoshaCLIExample
          swift build --product KaizoshaServerExample
          swift build --product KaizoshaProviderComparisonExample

  documentation:
    name: Documentation
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Generate DocC Archive
        run: |
          mkdir -p docs-build
          swift package --allow-writing-to-directory ./docs-build \
            generate-documentation \
            --target KaizoshaIntelligence \
            --output-path ./docs-build \
            --disable-indexing
